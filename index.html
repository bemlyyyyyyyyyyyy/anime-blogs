<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>50个博客网页鉴赏</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap');
  body{font-family:'Noto Sans SC',sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;overflow-x:hidden}
  .bg-grid{position:fixed;inset:0;background-image:
    linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:60px 60px;pointer-events:none;z-index:0}
  .container{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:40px 20px}
  header{text-align:center;margin-bottom:60px}
  header h1{font-size:3rem;font-weight:700;background:linear-gradient(135deg,#ff6b9d,#c44dff,#6e8efb,#43e97b);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin-bottom:16px;letter-spacing:2px}
  header p{font-size:1.1rem;color:#888;max-width:600px;margin:0 auto;line-height:1.8}
  .filters{display:flex;justify-content:center;gap:12px;margin-bottom:40px;flex-wrap:wrap}
  .filters button{padding:10px 24px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);
    color:#ccc;border-radius:30px;cursor:pointer;font-size:.9rem;transition:.3s;font-family:inherit}
  .filters button:hover,.filters button.active{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)}
  .filters button[data-cat="all"].active{background:linear-gradient(135deg,#ff6b9d,#c44dff);border-color:transparent}
  .filters button[data-cat="a"].active{background:linear-gradient(135deg,#ff9a9e,#fecfef);border-color:transparent;color:#333}
  .filters button[data-cat="b"].active{background:linear-gradient(135deg,#a855f7,#06b6d4);border-color:transparent}
  .filters button[data-cat="c"].active{background:linear-gradient(135deg,#dc2626,#fbbf24);border-color:transparent}
  .filters button[data-cat="d"].active{background:linear-gradient(135deg,#86efac,#67e8f9);border-color:transparent;color:#333}
  .filters button[data-cat="e"].active{background:linear-gradient(135deg,#f97316,#ec4899);border-color:transparent}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
  .card{border-radius:16px;overflow:hidden;position:relative;cursor:pointer;transition:.4s;
    border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03)}
  .card:hover{transform:translateY(-8px);border-color:rgba(255,255,255,.2);
    box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .card .preview{height:180px;position:relative;overflow:hidden}
  .card .preview .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:4rem;opacity:.6}
  .card .info{padding:20px}
  .card .info .num{font-size:.75rem;color:#666;font-weight:700;letter-spacing:2px;margin-bottom:6px}
  .card .info h3{font-size:1.1rem;font-weight:700;margin-bottom:8px;color:#f0f0f0}
  .card .info .tags{display:flex;gap:6px;flex-wrap:wrap}
  .card .info .tags span{font-size:.7rem;padding:3px 10px;border-radius:20px;
    background:rgba(255,255,255,.06);color:#999}
  .card.hidden{display:none}
  footer{text-align:center;margin-top:80px;padding:40px 0;color:#444;font-size:.85rem;
    border-top:1px solid rgba(255,255,255,.05)}
  @media(max-width:768px){
    header h1{font-size:2rem}
    .grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  }
</style>
</head>

  </header>
  <div class="filters">
    <button class="active" data-cat="all">全部</button>
    <button data-cat="a">日系二次元</button>
    <button data-cat="b">赛博朋克</button>
    <button data-cat="c">苏联解构</button>

  </div>
  <div class="grid" id="grid"></div>
  <footer>50 Blog Pages Collection — 手工制作，逐一鉴赏</footer>
</div>

const grid=document.getElementById('grid');
blogs.forEach(b=>{
  const card=document.createElement('div');
  card.className='card';
  card.dataset.cat=b.cat;
  card.innerHTML=`<div class="preview" style="background:${b.gradient}"><div class="overlay">${b.emoji}</div></div>
    <div class="info"><div class="num">NO.${b.n}</div><h3>${b.name}</h3>
    <div class="tags">${b.tags.map(t=>`<span>${t}</span>`).join('')}</div></div>`;
  card.onclick=()=>location.href=b.file;
  grid.appendChild(card);
});
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const cat=btn.dataset.cat;
    document.querySelectorAll('.card').forEach(c=>{
      c.classList.toggle('hidden',cat!=='all'&&c.dataset.cat!==cat);
    });
  };
});
